name: pr-title-lint

on:
    pull_request:
        types: [opened, edited, synchronize, reopened]
        branches: ["main", "feat/oid4vci-1.0"]

permissions:
    contents: read
    pull-requests: read

jobs:
    semantic:
        runs-on: ubuntu-latest
        steps:
            - uses: amannn/action-semantic-pull-request@v5
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
