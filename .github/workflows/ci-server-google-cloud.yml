name: CI server google-cloud

# server depends on issuer+verifier
on:
  pull_request:
    branches: ["main", "feat/oid4vci-1.0"]
    paths:
      - server/google-cloud/**

jobs:
  core:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run format
        run: |
          pnpm --filter ...@trustknots/server-google-cloud format

      - name: Run lint
        run: |
          pnpm --filter ...@trustknots/server-google-cloud lint

      - name: Build
        run: pnpm --filter ...@trustknots/server-google-cloud... build
